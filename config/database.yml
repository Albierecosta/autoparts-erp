default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV.fetch("DB_HOST", "") %>
  username: <%= ENV.fetch("DB_USERNAME", ENV.fetch("USER", "postgres")) %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>
  database: autoparts_development

test:
  <<: *default
  database: autoparts_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
